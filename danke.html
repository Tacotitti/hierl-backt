<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danke – Hierl backt</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #FFF8F2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 32px rgba(139,111,92,0.10);
        }
        .icon { font-size: 56px; margin-bottom: 20px; }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #8B6F5C;
            margin-bottom: 16px;
        }
        p {
            color: #6b7280;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        a {
            display: inline-block;
            background: #8B6F5C;
            color: white;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        a:hover { background: #5C4D42; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🎂</div>
        <h1>Vielen Dank!</h1>
        <p>Deine Anfrage ist bei uns eingegangen.<br>Wir melden uns so schnell wie möglich bei dir!</p>
        <a href="https://hierlbackt.de">Zurück zur Startseite</a>
    </div>
</body>
</html>
